{{ define "page"}}
{{$PageData := index .DeepDataMerge.Templates .PageURL}}
{{ template "head" .}}

<body class="site-body">
		{{ template "header" . }}
		<h1 id="post-title">{{ $PageData.Frontmatter.Title }}</h1>
		<div class="container">
			{{$PageData.Body}}
		</div>
		{{ template "footer" .}}
</body>		
</html>


{{ end}}
