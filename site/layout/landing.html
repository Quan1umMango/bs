{{define "landing"}}
{{$PageData := index .DeepDataMerge.Templates .PageURL}}

{{ template "head" .}}

<body class="site-body">
		{{ template "header" . }}
		<h1 id="big-title">{{ $PageData.Frontmatter.Title }} </h1>
		<div class="container">
			<p id="subtitle"> {{(index $PageData.Frontmatter.CustomFields 0).Subtitle}} </p>
			{{ $PageData.Body }}
		</div>

		{{ template "footer" .}}
</body>	

{{end}}
